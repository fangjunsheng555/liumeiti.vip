<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>常用会员服务，立即下单开通</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #eef2f6;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    a { text-decoration: none; }
    img { display: block; border: 0; }
    .wrap { width: 100%; padding: 18px 10px; }
    .email { width: 100%; max-width: 640px; margin: 0 auto; background: #fffaf2; border: 1px solid #e5dccf; border-radius: 24px; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: center; padding: 18px 26px; background: #fff; border-bottom: 1px solid #e7ded0; }
    .brand { width: 146px; height: auto; }
    .hero { padding: 30px 28px 22px; text-align: center; }
    .eyebrow { color: #9a6b28; font-size: 12px; line-height: 1.2; font-weight: 900; letter-spacing: .14em; }
    h1 { margin: 14px 0 10px; color: #111827; font-size: 34px; line-height: 1.12; font-weight: 900; letter-spacing: 0; }
    p { margin: 0; }
    .hero-copy { width: 300px; max-width: 300px; margin: 0 auto; color: #475569; font-size: 15px; line-height: 1.72; }
    .logo-row { display: flex; justify-content: center; gap: 10px; margin: 22px 0 18px; }
    .logo-row img { width: 58px; height: 58px; border-radius: 16px; border: 1px solid #e5e7eb; object-fit: cover; background: #fff; }
    .main-cta { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 0 42px; border-radius: 999px; background: #111827; color: #fffaf2; font-size: 15px; font-weight: 900; }
    .trust { padding: 14px 18px; text-align: center; background: #fff; border-top: 1px solid #e7ded0; border-bottom: 1px solid #e7ded0; color: #111827; font-size: 13px; line-height: 1.5; font-weight: 900; }
    .trust i { color: #d7ad64; font-style: normal; }
    .services { padding: 22px 28px 24px; background: #f8f3ea; }
    .kicker { margin-bottom: 10px; color: #8a632d; font-size: 12px; line-height: 1.2; font-weight: 900; letter-spacing: .14em; }
    .service { display: grid; grid-template-columns: 36px minmax(0, 1fr); gap: 10px; align-items: center; padding: 12px 0; border-top: 1px solid #e3d8c8; }
    .service img { width: 36px; height: 36px; border-radius: 10px; border: 1px solid #e5e7eb; object-fit: cover; background: #fff; }
    .service b { color: #111827; font-size: 15px; line-height: 1.35; font-weight: 900; }
    .service span { display: block; margin-top: 4px; color: #8a632d; font-size: 14px; line-height: 1.35; font-weight: 900; }
    .service.accent span { color: #b45f20; }
    .bottom-cta { padding: 22px 26px; text-align: center; background: #fff; }
    .footer { padding: 16px 22px 20px; text-align: center; background: #f4eee5; color: #667085; font-size: 12px; line-height: 1.75; }
    .footer a { color: #8a632d; font-weight: 850; }
    @media (max-width: 430px) {
      .wrap { padding: 12px; }
      .email { border-radius: 20px; }
      .topbar { padding: 16px 20px; }
      .brand { width: 132px; }
      .hero { padding: 26px 24px 20px; }
      h1 { font-size: 32px; }
      .hero-copy { width: 286px; max-width: 286px; font-size: 14.5px; }
      .logo-row { gap: 8px; }
      .logo-row img { width: 52px; height: 52px; border-radius: 14px; }
      .main-cta { width: 100%; max-width: 300px; padding: 0 20px; }
      .trust { padding: 12px 14px; font-size: 12px; }
      .services { padding: 20px 24px 22px; }
      .service { grid-template-columns: 36px minmax(0, 1fr); align-items: flex-start; }
      .service span { grid-column: 2; white-space: normal; }
      .bottom-cta .main-cta { max-width: 300px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="email">
      <div class="topbar">
        <a href="https://liumeiti.vip/"><img class="brand" src="assets/email-logo.png" alt="冒央会社"></a>
      </div>
      <section class="hero">
        <div class="eyebrow">MEMBERSHIP SHOP</div>
        <h1>会员服务<br>立即下单</h1>
        <p class="hero-copy">四类热门服务，明码标价，付款后开通。</p>
        <div class="logo-row">
          <img src="../../public/products/spotify.jpg" alt="Spotify">
          <img src="../../public/products/streaming-4k-edm-v2.jpg" alt="4K 影音会员">
          <img src="../../public/products/ai.jpg" alt="AI">
          <img src="../../public/products/rocket.jpg" alt="机场节点">
        </div>
        <a class="main-cta" href="https://liumeiti.vip/">去网站下单</a>
      </section>
      <section class="trust">
        <i>●</i> 明码标价&nbsp;&nbsp; <i>●</i> 快速开通&nbsp;&nbsp; <i>●</i> 售后保障
      </section>
      <section class="services">
        <div class="kicker">HOT SERVICES</div>
        <a class="service" href="https://liumeiti.vip/services/spotify"><img src="../../public/products/spotify.jpg" alt=""><b>Spotify 高价区订阅</b><span>¥128/年起 →</span></a>
        <a class="service" href="https://liumeiti.vip/shop"><img src="../../public/products/streaming-4k-edm-v2.jpg" alt=""><b>4K 影音会员</b><span>¥108/年起 →</span></a>
        <a class="service" href="https://liumeiti.vip/services/ai"><img src="../../public/products/ai.jpg" alt=""><b>AI 会员</b><span>¥198/三个月起 →</span></a>
        <a class="service accent" href="https://liumeiti.vip/services/airport-node"><img src="../../public/products/rocket.jpg" alt=""><b>机场节点</b><span>¥5/次 · ¥128/年起 →</span></a>
      </section>
      <section class="bottom-cta">
        <a class="main-cta" href="https://liumeiti.vip/">立即选择服务</a>
      </section>
      <footer class="footer">
        Maoyang Taiwan Inc · liumeiti.vip<br>
        <a href="https://liumeiti.vip/">服务目录</a> ·
        <a href="https://liumeiti.vip/service-center">服务中心</a> ·
        <a href="https://liumeiti.vip/account">账号中心</a>
      </footer>
    </main>
  </div>
</body>
</html>
